<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>$U (United Stables) Faucet</title>
    <link rel="icon" href="https://raw.githubusercontent.com/United-Coin-U/u-materials/ad302d225ad5ab22af490db21a709ad18885abfe/32.svg" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <section class="card hero">
        <p class="eyebrow">United Stables Testnet</p>
        <h1>$U Faucet</h1>
        <p class="desc">
          Connect your wallet to claim test tokens
          <strong>$U (United Stables)</strong> from the faucet contract.
        </p>
      </section>

      <section class="card actions">
        <div class="btn-row">
          <button id="connectButton" class="btn btn-secondary" type="button">
            Connect Wallet
          </button>
          <button id="claimButton" class="btn btn-primary" type="button" disabled>
            Claim $U
          </button>
        </div>

        <p id="statusText" class="status neutral">Waiting for wallet connection.</p>
      </section>

      <section class="card grid">
        <div class="item">
          <label>Wallet Address</label>
          <p id="addressText">-</p>
        </div>
        <div class="item">
          <label>Network</label>
          <p id="networkText">-</p>
        </div>
        <div class="item">
          <label>Claim Amount</label>
          <p id="claimAmountText">-</p>
        </div>
      </section>

      <section class="card tx">
        <label>Latest Transaction</label>
        <p id="txText">-</p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
